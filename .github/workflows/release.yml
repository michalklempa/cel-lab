name: release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            profiles: linux-jpackage
            asset: cel-lab-linux-x64.tar.gz
          - os: windows-latest
            profiles: windows-jpackage
            asset: cel-lab-windows-x64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build app-image
        run: mvn -B "-P${{ matrix.profiles }}" -Dvaadin.force.production.build=true -DskipTests clean package

      - name: Archive (Linux)
        if: runner.os == 'Linux'
        run: tar -C target/dist -czf "${{ matrix.asset }}" cel-lab

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path target/dist/cel-lab -DestinationPath "${{ matrix.asset }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
